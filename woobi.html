<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woobi OS: Lexicon & Translation Engine</title>
    <style>
        body {
            font-family: 'Helvetica', Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            text-align: center;
            color: #222;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        .input-group label {
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex-grow: 1;
        }
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: background 0.3s;
        }
        .btn-add { background-color: #4CAF50; }
        .btn-add:hover { background-color: #45a049; }
        .btn-delete { background-color: #f44336; }
        .btn-delete:hover { background-color: #da190b; }
        .btn-translate { background-color: #2196F3; }
        .btn-translate:hover { background-color: #0b7dda; }

        .table-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tr { cursor: pointer; }
        tr:hover { background-color: #f9f9f9; }
        tr.selected { background-color: #d1e7dd; }

        .output-box {
            width: 100%;
            min-height: 80px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fafafa;
            font-size: 16px;
            box-sizing: border-box;
            white-space: pre-wrap;
        }
        .red-bracket { color: red; }
    </style>
</head>
<body>

    <h1>Woobi Core Engine</h1>

    <div class="container">
        <div class="input-group">
            <label>English Word:</label>
            <input type="text" id="engInput" placeholder="e.g. Hello">
            <label>Woobi:</label>
            <input type="text" id="wooInput" placeholder="e.g. alo">
            <label>Pronunciation:</label>
            <input type="text" id="pronInput" placeholder="e.g. ah-loh">
            <button class="btn-add" onclick="addWord()">Add</button>
            <button class="btn-delete" onclick="deleteWord()">Delete Selected</button>
        </div>

        <div class="input-group">
            <label>Search Dictionary:</label>
            <input type="text" id="searchInput" placeholder="Search..." oninput="onSearch()">
        </div>

        <div class="table-container">
            <table id="dictTable">
                <thead>
                    <tr>
                        <th>English Concept</th>
                        <th>Woobi Word</th>
                        <th>Pronunciation</th>
                    </tr>
                </thead>
                <tbody id="dictBody">
                    </tbody>
            </table>
        </div>
    </div>

            <button class="btn-translate" onclick="translateSentence()">Translate</button>
        </div>
        <div id="outputBox" class="output-box"></div>
    </div>

let dbData = [];
let selectedIndex = -1;

// --- DATA MANAGEMENT ---
function loadData() {
    const saved = localStorage.getItem("woobi_db");
    if (saved) {
        dbData = JSON.parse(saved);
    } else {
        // First load, populate from default array
        dbData = DEFAULT_WOOBI_DB.map(item => ({ english: item[0], woobi: item[1], pronunciation: item[2] }));
        saveData();
    }
    renderTable();
}

function saveData() {
    localStorage.setItem("woobi_db", JSON.stringify(dbData));
}

// --- UI UPDATES ---
function renderTable(searchTerm = "") {
    const tbody = document.getElementById("dictBody");
    tbody.innerHTML = "";
    selectedIndex = -1; // reset selection

    const term = searchTerm.toLowerCase();

    dbData.forEach((item, index) => {
        if (item.english.toLowerCase().includes(term) || item.woobi.toLowerCase().includes(term)) {
            const tr = document.createElement("tr");
            tr.onclick = () => selectRow(tr, index);
            
            tr.innerHTML = `
                <td>${item.english}</td>
                <td>${item.woobi}</td>
                <td>${item.pronunciation}</td>
            `;
            tbody.appendChild(tr);
        }
    });
}

function selectRow(rowElement, index) {
    // Remove selected class from all
    const rows = document.querySelectorAll("#dictBody tr");
    rows.forEach(r => r.classList.remove("selected"));
    
    // Add to clicked
    rowElement.classList.add("selected");
    selectedIndex = index;
}

function onSearch() {
    const term = document.getElementById("searchInput").value;
    renderTable(term);
}

function addWord() {
    const eng = document.getElementById("engInput").value.trim();
    const woo = document.getElementById("wooInput").value.trim();
    const pron = document.getElementById("pronInput").value.trim();

    if (eng && woo) {
        // Insert at beginning to match Python behavior
        dbData.unshift({ english: eng, woobi: woo, pronunciation: pron });
        saveData();
        
        // Clear inputs and search
        document.getElementById("engInput").value = "";
        document.getElementById("wooInput").value = "";
        document.getElementById("pronInput").value = "";
        document.getElementById("searchInput").value = "";
        
        renderTable();
    } else {
        alert("Please provide at least the English word and Woobi sound.");
    }
}

function deleteWord() {
    if (selectedIndex === -1) {
        alert("Please click on a word in the table to select it for deletion.");
        return;
    }

    if (confirm("Delete selected word?")) {
        dbData.splice(selectedIndex, 1);
        saveData();
        renderTable(document.getElementById("searchInput").value);
    }
}

// --- TRANSLATION ENGINE LOGIC ---
function getLookupDict() {
    let lookup = {};
    dbData.forEach(item => {
        let englishWords = item.english.toLowerCase().split("/");
        englishWords.forEach(w => {
            lookup[w.trim()] = item.woobi.trim();
        });
    });
    return lookup;
}

function woobify(word) {
    let w = word.toLowerCase();
    const replacements = {
        "th":"t", "sh":"s", "ch":"s", "ph":"p", "ck":"k", 
        "r":"w", "l":"w", "v":"b", "f":"p", "z":"s", "c":"k", "j":"d"
    };
    
    // Replace consonant clusters
    for (const [oldChar, newChar] of Object.entries(replacements)) {
        w = w.split(oldChar).join(newChar);
    }
    
    // Remove consecutive duplicate letters
    w = w.replace(/(.)\1+/g, '$1');
    
    // Force CV ending
    if (!"aeioumn".includes(w.slice(-1))) {
        w += "a";
    }
    
    // Capitalize first letter
    return w.charAt(0).toUpperCase() + w.slice(1);
}

function handleEnter(e) {
    if (e.key === 'Enter') {
        translateSentence();
    }
}

function translateSentence() {
    const rawSentence = document.getElementById("sentenceInput").value.trim();
    if (!rawSentence) return;

    // Strip punctuation and split
    const cleanSentence = rawSentence.replace(/[^\w\s]/g, '').toLowerCase();
    const words = cleanSentence.split(/\s+/);
    const lookup = getLookupDict();

    let outputHTML = "";

    words.forEach(word => {
        if (lookup[word]) {
            outputHTML += lookup[word] + " ";
        } else if (word.endsWith('s') && lookup[word.slice(0, -1)]) {
            // Plural rule
            outputHTML += lookup[word.slice(0, -1)] + " te ";
        } else if (word.endsWith('ed') && lookup[word.slice(0, -2)]) {
            // Past tense rule
            outputHTML += "pa " + lookup[word.slice(0, -2)] + " ";
        } else {
            // Unknown word rule (attached bracket, NO space before it)
            let woobified = woobify(word);
            outputHTML += woobified + `<span class="red-bracket">[${word}]</span> `;
        }
    });

    document.getElementById("outputBox").innerHTML = outputHTML;
}
